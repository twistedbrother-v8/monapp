<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Certificat d'entretien — CHECKAR</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a0a; color: #fff; font-family: -apple-system, 'SF Pro Display', sans-serif; min-height: 100vh; }
    .header { background: linear-gradient(135deg, #0a1a0a, #1a2a1a); border-bottom: 2px solid #22ff0033; padding: 24px 20px; text-align: center; }
    .logo { font-size: 32px; margin-bottom: 8px; }
    .app-name { font-size: 24px; font-weight: 900; color: #22ff00; letter-spacing: 2px; }
    .subtitle { font-size: 12px; color: #888; margin-top: 4px; }
    .container { max-width: 480px; margin: 0 auto; padding: 20px 16px; }
    .cert-badge { background: linear-gradient(135deg, #1a2a1a, #0a1a0a); border: 2px solid #22ff0044; border-radius: 16px; padding: 16px; margin-bottom: 20px; text-align: center; }
    .cert-label { font-size: 10px; color: #888; letter-spacing: 2px; font-weight: 800; margin-bottom: 6px; }
    .cert-id { font-size: 14px; font-weight: 900; color: #22ff00; font-family: monospace; letter-spacing: 2px; }
    .vehicle-card { background: #1a1a1a; border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 20px; margin-bottom: 16px; }
    .vehicle-name { font-size: 22px; font-weight: 900; color: #fff; margin-bottom: 4px; }
    .vehicle-immat { font-size: 14px; color: #2157FF; font-weight: 700; background: rgba(33,87,255,0.15); display: inline-block; padding: 4px 12px; border-radius: 8px; margin-top: 6px; letter-spacing: 2px; }
    .stats { display: flex; gap: 10px; margin-bottom: 20px; }
    .stat { flex: 1; background: #1a1a1a; border-radius: 12px; padding: 14px; text-align: center; border: 1px solid rgba(255,255,255,0.08); }
    .stat-value { font-size: 28px; font-weight: 900; color: #22ff00; }
    .stat-label { font-size: 11px; color: #888; margin-top: 4px; }
    .section-title { font-size: 11px; font-weight: 800; color: #888; letter-spacing: 1px; margin-bottom: 10px; margin-top: 20px; }
    .intervention { background: #1a1a1a; border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; padding: 14px 16px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
    .interv-desc { font-size: 14px; font-weight: 700; color: #fff; }
    .interv-date { font-size: 11px; color: #888; margin-top: 3px; }
    .interv-amount { font-size: 16px; font-weight: 900; color: #ffb133; }
    .no-interv { text-align: center; color: #888; padding: 30px; font-size: 14px; }
    .footer { text-align: center; padding: 30px 20px; color: #555; font-size: 11px; line-height: 1.8; }
    .footer a { color: #2157FF; text-decoration: none; }
    .verified { background: rgba(34,255,0,0.1); border: 1px solid #22ff0033; border-radius: 12px; padding: 12px 16px; margin-bottom: 16px; display: flex; align-items: center; gap: 10px; }
    .verified-icon { font-size: 24px; }
    .verified-text { font-size: 12px; color: #22ff00; font-weight: 700; }
    .verified-sub { font-size: 11px; color: #888; margin-top: 2px; }
    .total { background: rgba(255,177,51,0.1); border: 1px solid rgba(255,177,51,0.3); border-radius: 12px; padding: 14px 16px; display: flex; justify-content: space-between; align-items: center; margin-top: 10px; }
    .total-label { font-size: 13px; color: #888; font-weight: 700; }
    .total-value { font-size: 20px; font-weight: 900; color: #ffb133; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">🚗</div>
    <div class="app-name">CHECKAR</div>
    <div class="subtitle">Carnet d'entretien certifié</div>
  </div>

  <div class="container">
    <div class="cert-badge">
      <div class="cert-label">🔗 CERTIFICAT D'ENTRETIEN VÉRIFIÉ</div>
      <div class="cert-id" id="certId">—</div>
    </div>

    <div class="verified">
      <div class="verified-icon">✅</div>
      <div>
        <div class="verified-text">Données certifiées par CHECKAR</div>
        <div class="verified-sub">Généré le <span id="certDate">—</span></div>
      </div>
    </div>

    <div class="vehicle-card">
      <div class="vehicle-name" id="vehicleName">—</div>
      <div class="vehicle-immat" id="vehicleImmat">—</div>
    </div>

    <div class="stats">
      <div class="stat">
        <div class="stat-value" id="nbVerif">0</div>
        <div class="stat-label">Vérifications</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="nbInterv">0</div>
        <div class="stat-label">Interventions</div>
      </div>
    </div>

    <div class="section-title">🔧 HISTORIQUE DES INTERVENTIONS GARAGE</div>
    <div id="interventions"></div>

    <div class="footer">
      <p>Document généré par <a href="https://checkar-4a9ad.web.app">CHECKAR</a></p>
      <p>Carnet d'entretien numérique · Bientôt sur Blockchain</p>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const certId = params.get("id") || "—";
    const vehicleName = params.get("v") || "Véhicule inconnu";
    const immat = params.get("i") || "—";
    const nbVerif = params.get("verif") || "0";
    const nbInterv = params.get("interv") || "0";
    const date = params.get("date") || "—";
    let travaux = [];
    try { travaux = JSON.parse(params.get("travaux") || "[]"); } catch(e) {}

    document.getElementById("certId").textContent = certId;
    document.getElementById("vehicleName").textContent = vehicleName;
    document.getElementById("vehicleImmat").textContent = immat;
    document.getElementById("nbVerif").textContent = nbVerif;
    document.getElementById("nbInterv").textContent = nbInterv;
    document.getElementById("certDate").textContent = date;

    const container = document.getElementById("interventions");
    if (travaux.length === 0) {
      container.innerHTML = '<div class="no-interv">Aucune intervention garage enregistrée</div>';
    } else {
      let total = 0;
      travaux.forEach(t => {
        const montant = parseFloat(t.montant) || 0;
        total += montant;
        container.innerHTML += `
          <div class="intervention">
            <div>
              <div class="interv-desc">${t.desc || "Intervention garage"}</div>
              <div class="interv-date">📅 ${t.date || "—"}</div>
            </div>
            <div class="interv-amount">${montant.toFixed(2)} €</div>
          </div>`;
      });
      if (total > 0) {
        container.innerHTML += `
          <div class="total">
            <div class="total-label">💰 Total interventions</div>
            <div class="total-value">${total.toFixed(2)} €</div>
          </div>`;
      }
    }
  </script>
</body>
</html>
