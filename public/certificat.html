<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Certificat d entretien — CHECKAR</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #000000;
      color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      min-height: 100vh;
    }
    .header {
      background: #0A0A1A;
      padding: 18px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .logo { font-size: 22px; font-weight: 900; letter-spacing: 2px; color: #ffffff; }
    .logo span { color: #2157FF; }
    .badge {
      background: rgba(33,87,255,0.15);
      border: 1px solid rgba(33,87,255,0.4);
      border-radius: 20px;
      padding: 5px 14px;
      font-size: 11px;
      font-weight: 700;
      color: #2157FF;
      letter-spacing: 0.5px;
    }
    .container { max-width: 480px; margin: 0 auto; padding: 20px 16px 40px; }
    .card {
      background: #3A3A40;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.08);
      padding: 16px;
      margin-bottom: 12px;
    }
    .cert-block {
      background: linear-gradient(135deg, #1a2a1a, #0a1a0a);
      border: 2px solid rgba(34,255,0,0.27);
      border-radius: 20px;
      padding: 24px 20px;
      margin-bottom: 12px;
      text-align: center;
    }
    .cert-title {
      font-size: 13px;
      font-weight: 800;
      color: #22ff00;
      letter-spacing: 2px;
      margin-bottom: 4px;
    }
    .cert-sub {
      font-size: 10px;
      color: #8e8e93;
      margin-bottom: 20px;
    }
    .cert-id {
      background: rgba(0,0,0,0.4);
      border-radius: 10px;
      padding: 10px 14px;
      margin-bottom: 16px;
    }
    .cert-id-label { font-size: 10px; color: #8e8e93; margin-bottom: 4px; }
    .cert-id-value {
      font-size: 14px;
      font-weight: 900;
      color: #22ff00;
      letter-spacing: 2px;
      font-family: monospace;
    }
    .stats-row {
      display: flex;
      justify-content: space-around;
      margin-bottom: 16px;
    }
    .stat-item { text-align: center; }
    .stat-value { font-size: 26px; font-weight: 900; color: #22ff00; }
    .stat-label { font-size: 10px; color: #8e8e93; margin-top: 2px; }
    .divider { width: 1px; background: rgba(34,255,0,0.13); }
    .vehicle-name { font-weight: 900; font-size: 22px; color: #ffffff; margin-bottom: 6px; }
    .vehicle-meta { display: flex; align-items: center; gap: 8px; margin-top: 4px; }
    .immat {
      background: rgba(255,255,255,0.1);
      border-radius: 6px;
      padding: 2px 10px;
      font-weight: 700;
      font-size: 13px;
      color: #ffffff;
    }
    .section-title {
      font-size: 11px;
      font-weight: 800;
      color: #aeaeb2;
      letter-spacing: 0.5px;
      margin-bottom: 12px;
    }
    .travail-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 0;
    }
    .travail-row + .travail-row { border-top: 1px solid rgba(255,255,255,0.08); }
    .travail-date { font-size: 11px; color: #8e8e93; margin-bottom: 3px; }
    .travail-desc { font-size: 14px; font-weight: 600; color: #ffffff; }
    .travail-montant { font-size: 14px; font-weight: 800; color: #89fc68; }
    .empty { font-size: 13px; color: #8e8e93; text-align: center; padding: 20px 0; }
    .stamp {
      background: rgba(34,255,0,0.06);
      border: 2px solid rgba(34,255,0,0.4);
      border-radius: 14px;
      padding: 16px;
      text-align: center;
      margin-top: 4px;
      margin-bottom: 20px;
    }
    .stamp-title { font-size: 13px; font-weight: 900; color: #22ff00; letter-spacing: 1px; margin-bottom: 4px; }
    .stamp-date { font-size: 12px; color: #aeaeb2; }
    .loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 60vh;
      gap: 16px;
    }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid rgba(255,255,255,0.1);
      border-top-color: #2157FF;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error-box {
      background: rgba(252,63,53,0.08);
      border: 1px solid rgba(252,63,53,0.3);
      border-radius: 14px;
      padding: 24px;
      text-align: center;
      margin: 40px 16px;
    }
    .error-icon { font-size: 40px; margin-bottom: 12px; }
    .error-msg { font-size: 15px; color: #fc3f35; font-weight: 700; }
    .error-sub { font-size: 13px; color: #8e8e93; margin-top: 8px; }
    .footer {
      text-align: center;
      padding: 20px 0 0;
      font-size: 11px;
      color: #8e8e93;
      line-height: 1.8;
    }
    .footer a { color: #2157FF; text-decoration: none; }
  </style>
</head>
<body>

<div class="header">
  <div class="logo">CHECK<span>AR</span></div>
  <div class="badge">CERTIFICAT VERIFIE</div>
</div>

<div id="root">
  <div class="loading">
    <div class="spinner"></div>
    <div style="color:#8e8e93;font-size:14px;">Chargement du certificat...</div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey:            "AIzaSyBnALwWwPaTyizMiywmKRLhXUGwXXK7x_k",
    authDomain:        "checkar-4a9ad.firebaseapp.com",
    projectId:         "checkar-4a9ad",
    storageBucket:     "checkar-4a9ad.firebasestorage.app",
    messagingSenderId: "489510743392",
    appId:             "1:489510743392:web:7c7c0c6265911d5fd0c205",
  };

  const app = initializeApp(firebaseConfig);
  const db  = getFirestore(app);

  function esc(s) {
    return (s || "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  }

  function formatMontant(m) {
    if (!m && m !== 0) return "";
    return Number(m).toLocaleString("fr-FR", { style: "currency", currency: "EUR" });
  }

  function render(data, certId) {
    const travaux = data.travaux || [];
    const travauxHTML = travaux.length === 0
      ? '<div class="empty">Aucune intervention enregistree</div>'
      : travaux.map(t =>
          '<div class="travail-row">' +
            '<div>' +
              '<div class="travail-date">' + esc(t.date) + '</div>' +
              '<div class="travail-desc">' + esc(t.desc) + '</div>' +
            '</div>' +
            '<div class="travail-montant">' + formatMontant(t.montant) + '</div>' +
          '</div>'
        ).join("");

    document.getElementById("root").innerHTML =
      '<div class="container">' +

        '<div class="cert-block">' +
          '<div class="cert-title">&#128279; CERTIFICAT D&apos;ENTRETIEN</div>' +
          '<div class="cert-sub">Powered by CHECKAR &mdash; Bientot sur Blockchain</div>' +
          '<div class="cert-id">' +
            '<div class="cert-id-label">ID CERTIFICAT</div>' +
            '<div class="cert-id-value">' + esc(certId) + '</div>' +
          '</div>' +
          '<div class="stats-row">' +
            '<div class="stat-item">' +
              '<div class="stat-value">' + travaux.length + '</div>' +
              '<div class="stat-label">Interventions garage</div>' +
            '</div>' +
            '<div class="divider"></div>' +
            '<div class="stat-item">' +
              '<div class="stat-value" style="font-size:14px;margin-top:4px">' + esc(data.date) + '</div>' +
              '<div class="stat-label">Genere le</div>' +
            '</div>' +
          '</div>' +
        '</div>' +

        '<div class="card">' +
          '<div class="vehicle-name">' + esc(data.vehicleName) + '</div>' +
          (data.vehicleImmat ? '<div class="vehicle-meta"><span class="immat">' + esc(data.vehicleImmat) + '</span></div>' : '') +
        '</div>' +

        (travaux.length > 0
          ? '<div class="card"><div class="section-title">&#128295; INTERVENTIONS GARAGE</div>' + travauxHTML + '</div>'
          : '') +

        '<div class="stamp">' +
          '<div class="stamp-title">&#10003; CERTIFIE CHECKAR</div>' +
          '<div class="stamp-date">Document genere le ' + esc(data.date) + '</div>' +
        '</div>' +

        '<div class="footer">' +
          'Certificat authentifie par <a href="https://checkar.checkapp-studio.fr">CHECKAR</a><br>' +
          'ID : ' + esc(certId) +
        '</div>' +

      '</div>';
  }

  function renderError(msg) {
    document.getElementById("root").innerHTML =
      '<div class="error-box">' +
        '<div class="error-icon">&#128269;</div>' +
        '<div class="error-msg">' + esc(msg) + '</div>' +
        '<div class="error-sub">Verifiez que le lien est correct ou contactez le proprietaire du vehicule.</div>' +
      '</div>';
  }

  const certId = new URLSearchParams(window.location.search).get("id");

  if (!certId) {
    renderError("Aucun identifiant de certificat fourni.");
  } else {
    document.title = "Certificat " + certId + " — CHECKAR";
    getDoc(doc(db, "certificats", certId))
      .then(snap => {
        if (!snap.exists()) {
          renderError("Certificat introuvable.");
        } else {
          render(snap.data(), certId);
        }
      })
      .catch(err => {
        console.error(err);
        renderError("Erreur lors du chargement du certificat.");
      });
  }
</script>

</body>
</html>
